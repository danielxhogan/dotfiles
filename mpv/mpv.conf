vo=gpu-next
# vo=gpu
gpu-api=vulkan
hwdec=nvdec

loop-file=inf
force-window=yes
geometry=2880x1620
# geometry=3360x1890
border=no

osd-bar=no
osd-on-seek=no
# osd-on-seek=msg
# osd-duration=3000
osd-color='#ffc0cb'

sid=1
