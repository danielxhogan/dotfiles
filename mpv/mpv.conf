[watch]
geometry=2880x1620
osc=no

[inspect]
geometry=3360x1890
osc=yes
script-opts=show-stats=yes

[inspect-playlist]
geometry=3360x1890
osc=yes

[inspect-fs]
geometry=3360x1890
osc=yes
script-opts=show-stats=yes
fullscreen=yes

[inspect-quality]
geometry=3360x1890
osc=yes
fullscreen=yes

[4k]
target-prim=bt.2020
target-trc=pq
