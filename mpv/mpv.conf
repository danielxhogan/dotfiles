vo=gpu-next
# vo=gpu
gpu-api=vulkan
hwdec=nvdec

loop-file=inf
force-window=yes
geometry=2880x1620
# geometry=3360x1890
border=no

osd-bar=no
osd-on-seek=no
# osd-on-seek=msg
# osd-duration=3000
osd-color='#ffc0cb'

sid=1
watch-later-options-remove=sub-pos

[watch]
osc=no
sub-pos=110

[inspect]
osc=yes
sub-pos=105
script-opts=show-stats=yes

[inspect-playlist]
osc=yes
sub-pos=105

[inspect-fs]
osc=yes
sub-pos=105
script-opts=show-stats=yes
fullscreen=yes

[inspect-quality]
osc=yes
sub-pos=105
fullscreen=yes

[4k]
target-prim=bt.2020
target-trc=pq
