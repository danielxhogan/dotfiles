f cycle video down
j cycle video
d cycle audio down
k cycle audio
s cycle sub down
l cycle sub

enter cycle fullscreen
i script-binding stats/display-stats-toggle
_ cycle deinterlace

q quit-watch-later
Q quit

y seek 0 absolute
g add chapter 1
a add chapter -1
t seek 60
r seek 5
e seek -5
w seek -60